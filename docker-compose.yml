services:
  qwen-test-expert:
    build: .
    image: qwen-test-expert:latest
    container_name: qwen_test_expert_container
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
    environment:
      # Qwen API 配置（通过 .env 注入）
      - QWEN_API_KEY=${QWEN_API_KEY}
      - QWEN_BASE_URL=${QWEN_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      - QWEN_MODEL_NAME=${QWEN_MODEL_NAME:-qwen-plus}
      # 代理设置：按需开启
      - HTTP_PROXY=${HTTP_PROXY:-http://host.docker.internal:7897}
      - HTTPS_PROXY=${HTTPS_PROXY:-http://host.docker.internal:7897}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped